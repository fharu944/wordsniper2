<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ワードスナイパー</title>
<link rel = "stylesheet" href="./style.css">
</head>

<body>
<div id="startScreen">

    <h1>ワードスナイパー</h1>

    <button onclick="createRoom()">
        ルーム作成
    </button>
        
    <button onclick="joinRoom()">
        ルーム参加
    </button>

    <button onclick="showRules()">
        遊び方
    </button>

    <button onclick="startGame()">
        ゲームをプレイする
    </button>

</div>

<div id="rulesScreen" style="display:none;">
    <h2>遊び方</h2>
    
    <div class="rules-content">
        <p style="text-align: center; font-weight: bold; color: #f44336; margin-bottom: 15px;">
            ⚠️ 回答は【ひらがな】または【カタカナ】で入力してください
        </p>

        <p>テーマと文字に合う言葉を答えます。</p>
        <div class="example">
            例）テーマ：<strong>食べ物</strong> ＋ 文字：<strong>「あ」</strong><br>
            👉 「あいすくりーむ」「アイス」など
        </div>

        <ul style="padding-left: 20px; margin-top: 15px;">
            <li>⭕ <strong>正解：</strong> ＋10点</li>
            <li>❌ <strong>不正解：</strong> －10点</li>
            <li>🏆 <strong>50点先取</strong> で勝ちとなります！</li>
        </ul>
    </div>

    <button class="grayBtn" onclick="backStartFromRules()">
        戻る
    </button>
</div>


<div id="joinScreen" style="display:none;">

    <h2>ルーム参加</h2>

    <p>あなたの名前</p>
    <input type="text" id="joinPlayerNameInput" placeholder="名前を入力">

    <p>ルーム番号</p>
    <input type="text" id="roomCode" placeholder="ルーム番号（6桁）">

    <button class="greenBtn" onclick="joinRoomServer()">
        参加
    </button>

    <button class="grayBtn" onclick="backStartFromJoin()">
        戻る
    </button>
</div>

<div id="createScreen" style="display:none;">

    <h2>ルーム作成</h2>

    <p>あなたの名前</p>

    <input
        type="text"
        id="playerNameInput"
        placeholder="名前を入力">

    <p>ルーム番号</p>

    <div id="roomNumber">
        483291
    </div>

    <p class="roomText">
        相手にこの番号を教えてください
    </p>

    <button class="greenBtn" onclick="startWaiting()">
        ゲーム開始
    </button>

    <button class="grayBtn"
            onclick="backStart()">
        戻る
    </button>
    
</div>

<div class="container" id="gameScreen" style="display:none;">

     <div id="timerBar">
    <div id="timerFill"></div>

    <div id="scores">

        <div class="player-box">
            <div class="player-name" id="playerName1">1P</div>
            <div class="player-score" id="score1">0</div>
        </div>

        <div class="player-box">
            <div class="player-name">2P</div>
            <div class="player-score" id="score2">0</div>
        </div>

    </div>

    <div class="box-container">

        <button class="box" onclick="changeTheme()" id="themeBox">
        </button>

        <button class="box" id="wordBox">
        </button>

    </div>

</div>

    <div id="resultMessage"></div>

<div id="answerArea" style="display:none;">

    <input type="text"
                id="answerInput"
                onkeydown="checkEnter(event)">

    <button onclick="sendAnswer()">
        送信
    </button>

</div>

    <div class="bottom-menu">

        <button class="btn1" onclick="openInput()"id="playerButton">
            1P
        </button>

    </div>

    <div id="judgeArea" style="display:none;">

        <p>チャレンジしますか？</p>

        <button class="yes-btn" onclick="aiJudgeYes()">
            はい
        </button>

        <button class="no-btn" onclick="aiJudgeNo()">
            いいえ
        </button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket = io();

async function startGame(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";

    let playerName =
document.getElementById("playerNameInput").value;
    changeTheme();
}

function createRoom(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("createScreen").style.display="flex";
}

function joinRoom(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("joinScreen").style.display = "flex"; 
}

function backStart(){
    document.getElementById("createScreen").style.display="none";
    document.getElementById("startScreen").style.display="flex";
}

function backStartFromJoin(){
    document.getElementById("joinScreen").style.display = "none";
    document.getElementById("startScreen").style.display = "flex";
}

function showRules(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("rulesScreen").style.display = "flex";
}

function backStartFromRules(){
    document.getElementById("rulesScreen").style.display = "none";
    document.getElementById("startScreen").style.display = "flex";
}

function openInput(){
    document.getElementById("answerArea").style.display = "block";
    document.getElementById("playerButton").disabled = true;
}

async function sendAnswer(){
    socket.emit("ans_check", (document.getElementById("answerInput").value));
    document.getElementById("answerInput").value = "";
    
}

socket.on("ans_check", function(ret){
    if(ret.TF.includes("ok")){
        showMessage("正解！","gold");
        addPoint(1, ret.PT);
        changeTheme();
        document.getElementById("playerButton").disabled = false;
    }
    else if(ret.TF.includes("NG")){
        document.getElementById("judgeArea").style.display ="block";
    }
    else{console.log("error");}

    document.getElementById("answerArea").style.display ="none";
});

async function aiJudgeYes(){
    socket.emit("AI_test", (document.getElementById("answerInput").value));
}

socket.on("AI_check", function(answer){
    console.log("ans =", answer);
    console.log("type =", typeof answer);
    if(answer.includes("1")){
        showMessage("正解！","gold");
        addPoint(1, 1000);
        changeTheme();
        document.getElementById("playerButton").disabled = false;
    }
    else if(answer.includes("0")){
        document.getElementById("judgeArea").style.display ="block";
        showMessage("不正解！","red");
        addPoint(1,-500);
        document.getElementById("playerButton").disabled = false;
    }
    else{console.log("error");}

    document.getElementById("judgeArea").style.display="none";
});

async function aiJudgeNo(){
    showMessage("不正解！","red");
    addPoint(1, -100);
    document.getElementById("judgeArea").style.display="none";
}

let scores = [0,0];

let timer = 10;
let timerId;

function addPoint(player, PT){
    scores[player - 1]+=PT;
    document.getElementById("score" + player).textContent = scores[player - 1];

    if(scores[player - 1] >= 50){
        alert(player + "Pの勝利！");
    }
}

// changeThemeの中は「サーバーにお願いする（emit）」だけにする
async function changeTheme(){
    let bar = document.getElementById("timerFill");
    bar.style.width = "100%";
    bar.style.background = "linear-gradient(90deg,#4CAF50,#ffeb3b,#f44336)";
    bar.style.animation = "none";
    
    console.log("iou");
    socket.emit("give_theme");
    socket.emit("give_word");

    startTimer(); 
    
}

// サーバーからデータが返ってきたときの処理は、外側に1回だけ書く
socket.on("give_theme", (theme) => {
    document.getElementById("themeBox").textContent = theme;
});

socket.on("give_word", (word) => {
    document.getElementById("wordBox").textContent = word;
});

function checkEnter(event){
    if(event.key === "Enter"){
        sendAnswer();
    }
}

function startTimer(){

    timer = 10;

    let bar = document.getElementById("timerFill");

    bar.style.width = "100%";
    bar.style.animation = "none";

    clearInterval(timerId);

    timerId = setInterval(function(){

        timer--;

        bar.style.width = (timer / 10 * 100) + "%";

        // 残り3秒で赤く点滅
        if(timer <= 3){
            bar.style.background = "#f44336";
            bar.style.animation = "blink 0.5s infinite";
        }

        if(timer <= 0){

            clearInterval(timerId);

            document.getElementById("answerArea").style.display = "none";

            showMessage("時間切れ！","red");

            // 2秒後に次のお題
            setTimeout(function(){

                changeTheme();

            },2000);

        }

    },1000);
}

function showMessage(text,color){
    let message = document.getElementById("resultMessage");
    message.textContent = text;
    message.style.color = color;
    message.style.display = "block";

    setTimeout(function(){
        message.style.display = "none";
    },1000);
}
</script>
</body>
</html>
