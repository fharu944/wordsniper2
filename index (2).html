<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ワードスナイパー</title>
<link rel = "stylesheet" href="./style.css">
</head>

<body>
<div id="startScreen">

    <h1>ワードスナイパー</h1>

    <button onclick="createRoom()">
        ルーム作成
    </button>
        
    <button onclick="joinRoom()">
        ルーム参加
    </button>

    <button onclick="showRules()">
        遊び方
    </button>

    <button onclick="startGame()">
        ゲームをプレイする
    </button>

</div>

<div id="wait" style="display: none;">
    <h2>対戦相手を待っています...</h2>
    <p style="font-size: 24px; margin: 20px 0; font-weight: bold;">
        準備完了: <span id="currentPlayers">1</span> / 2 人
    </p>
    <div class="spinner"></div>
    <p style="color: #555;">もう1人が準備完了になると自動的にゲームが始まります。</p>
</div>

<div id="joinScreen" style="display:none;">

    <h2>ルーム参加</h2>

    <p>あなたの名前</p>
    <input type="text" id="joinPlayerNameInput" placeholder="名前を入力">

    <p>ルーム番号</p>
    <input type="text" id="roomCode" placeholder="ルーム番号（6桁）">

    <button class="greenBtn" onclick="joinRoomServer()">
        参加
    </button>

    <button class="grayBtn" onclick="backStartFromJoin()">
        戻る
    </button>
</div>

<div id="createScreen" style="display:none;">

    <h2>ルーム作成</h2>

    <p>あなたの名前</p>

    <input
        type="text"
        id="playerNameInput"
        placeholder="名前を入力">

    <p>ルーム番号</p>

    <div id="roomNumber">
        483291
    </div>

    <p class="roomText">
        相手にこの番号を教えてください
    </p>

    <button class="greenBtn">
        ゲーム開始
    </button>

    <button class="grayBtn"
            onclick="backStart()">
        戻る
    </button>
    
</div>

<div class="container" id="gameScreen" style="display:none;">

    <div id="scores">

        <div class="player-box">
            <div class="player-name" id="playerName1">1P</div>
            <div class="player-score" id="score1">0</div>
        </div>

        <div class="player-box">
            <div class="player-name">2P</div>
            <div class="player-score" id="score2">0</div>
        </div>

    </div>

    <div class="box-container">

        <button class="box" onclick="changeTheme()" id="themeBox">
        </button>

        <button class="box" id="wordBox">
        </button>

    </div>

    <div id="resultMessage"></div>

<div id="answerArea" style="display:none;">

    <input type="text"
                id="answerInput"
                onkeydown="checkEnter(event)">

    <button onclick="sendAnswer()">
        送信
    </button>

</div>

    <div class="bottom-menu">

        <button class="btn1" onclick="openInput()"id="playerButton">
            1P
        </button>

    </div>

    <div id="judgeArea" style="display:none;">

        <p>チャレンジしますか？</p>

        <button class="yes-btn" onclick="aiJudgeYes()">
            はい
        </button>

        <button class="no-btn" onclick="aiJudgeNo()">
            いいえ
        </button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket =io();

async function startGame(){

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";

    let playerName =
        prompt("名前を入力してください");
    document.getElementById("playerName1").textContent = playerName;
    changeTheme();
}

function createRoom(){

    document.getElementById("startScreen").style.display="none";

    document.getElementById("createScreen").style.display="flex";
}

function joinRoom(){

    alert("ルーム参加画面へ");

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("joinScreen").style.display = "block";
}

function backStart(){

    document.getElementById("createScreen").style.display="none";

    document.getElementById("startScreen").style.display="flex";

}

// ルーム参加ボタンを押したときの処理（アラートを消して画面を表示）
function joinRoom(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("joinScreen").style.display = "flex"; // CSSに合わせてflexに変更
}

// ルーム参加画面からスタート画面に戻る処理（新規追加）
function backStartFromJoin(){
    document.getElementById("joinScreen").style.display = "none";
    document.getElementById("startScreen").style.display = "flex";
}

// ルーム参加のサーバー通信を呼ぶ関数（名前の取得などを追加する場合のベース）
async function joinRoomServer(){
    let playerName = document.getElementById("joinPlayerNameInput").value;
    let roomCode = document.getElementById("roomCode").value;

    if(!playerName || !roomCode) {
        alert("名前とルーム番号を入力してください");
        return;
    }

    // ここでサーバーに送信する（既存の処理に合わせる）
    // socket.emit("join_room", { name: playerName, room: roomCode });
    
    // テスト用に画面を切り替える場合は以下を有効にしてください
    // document.getElementById("joinScreen").style.display = "none";
    // document.getElementById("gameScreen").style.display = "flex";
    // document.getElementById("playerName1").textContent = playerName;
}

function showRules(){

    alert("テーマと文字に合う言葉を答えます。\n例テーマ：食べ物　文字：あ　アイスクリームなど。\n先に得点した方が勝ちです。");
}

function openInput(){

    document.getElementById("answerArea").style.display =
        "block";
}

async function sendAnswer(){

    socket.emit("ans_check", (document.getElementById("answerInput").value));
    
}

socket.on("ans_check", function(ret){
    if(ret.TF.includes("ok")){
        showMessage("正解！","gold");
        addPoint(1, ret.PT);
        changeTheme();
    }
    else if(ret.TF.includes("NG")){
        document.getElementById("judgeArea").style.display ="block";
    }
    else{console.log("error");}

    document.getElementById("answerArea").style.display ="none";
});

async function aiJudgeYes(){
    
    socket.emit("AI_test", (document.getElementById("answerInput").value));


}

socket.on("AI_check", function(answer){
    
    console.log("ans =", answer);
    console.log("type =", typeof answer);
    if(answer.includes("1")){
        showMessage("正解！","gold");
        addPoint(1, 1000);
        changeTheme();
    }

    else if(answer.includes("0")){
        document.getElementById("judgeArea").style.display ="block";
        showMessage("不正解！","red");
        addPoint(1,-500);
        
    }

    else{console.log("error");}

    document.getElementById("judgeArea").style.display="none";
});

async function aiJudgeNo(){
    showMessage("不正解！","red");
    addPoint(1, -100);
    document.getElementById("judgeArea").style.display="none";
}

let scores = [0,0];

function addPoint(player, PT){

    scores[player - 1]+=PT;

    document.getElementById("score" + player).textContent =
        scores[player - 1];
}

async function changeTheme(){
    console.log("iou");
    socket.emit("give_theme");
    socket.on("give_theme", (theme) => {
        document.getElementById("themeBox").textContent = theme;
    });

    socket.emit("give_word");
    socket.on("give_word", (word) => {
        document.getElementById("wordBox").textContent = word;
    });
}

function checkEnter(event){

    if(event.key === "Enter"){
        sendAnswer();
    }
}

function showMessage(text,color){

    let message =
        document.getElementById("resultMessage");

    message.textContent = text;

    message.style.color = color;

    message.style.display = "block";
    

    setTimeout(function(){

        message.style.display = "none";

    },1000);

}


</script>



</body>
</html>
